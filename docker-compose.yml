services:
  api:
    build: .
    container_name: opensentinel-api
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  worker:
    build: .
    container_name: opensentinel-worker
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    command: celery -A app.workers.celery_app:celery_app worker --loglevel=INFO

  beat:
    build: .
    container_name: opensentinel-beat
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    command: celery -A app.workers.celery_app:celery_app beat --loglevel=INFO

  postgres:
    image: postgres:16
    container_name: opensentinel-postgres
    environment:
      POSTGRES_USER: opensentinel
      POSTGRES_PASSWORD: opensentinel
      POSTGRES_DB: opensentinel
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: opensentinel-redis
    ports:
      - "6379:6379"

volumes:
  pg_data:
