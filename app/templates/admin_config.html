<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OpenSentinel Config</title>
  <style>
    :root {
      --bg: #f3f5f9;
      --card: #ffffff;
      --text: #18222e;
      --muted: #5f6b7a;
      --line: #d8dfe8;
      --primary: #0b6bcb;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: radial-gradient(circle at 20% 0%, #e7edf8 0%, var(--bg) 55%);
      color: var(--text);
      font-family: "Segoe UI", "PingFang SC", "Noto Sans CJK SC", sans-serif;
    }
    .wrap { max-width: 900px; margin: 24px auto; padding: 0 16px; }
    .card { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 16px; margin-bottom: 16px; }
    h1 { margin: 0 0 12px; font-size: 24px; }
    .hint { color: var(--muted); font-size: 12px; }
    label { display: block; font-size: 13px; color: var(--muted); margin: 10px 0 4px; }
    input, textarea, select { width: 100%; border: 1px solid var(--line); border-radius: 8px; padding: 8px; font-size: 14px; }
    textarea { min-height: 140px; resize: vertical; }
    button { border: none; background: var(--primary); color: #fff; border-radius: 8px; padding: 8px 12px; cursor: pointer; margin-top: 12px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>系统配置</h1>
      <p class="hint"><a href="/admin">返回管理台</a></p>
      {% if message %}
      <p class="hint" style="color:#0f8a43;">{{ message }}</p>
      {% endif %}
      <form method="post" action="/admin/config">
        <label>LLM Provider</label>
        <select name="llm_provider">
          <option value="mock" {% if config.llm_provider == 'mock' %}selected{% endif %}>mock</option>
          <option value="openai" {% if config.llm_provider == 'openai' %}selected{% endif %}>openai</option>
          <option value="openrouter" {% if config.llm_provider == 'openrouter' %}selected{% endif %}>openrouter</option>
          <option value="bailian" {% if config.llm_provider == 'bailian' %}selected{% endif %}>bailian</option>
          <option value="anthropic" {% if config.llm_provider == 'anthropic' %}selected{% endif %}>anthropic</option>
          <option value="custom" {% if config.llm_provider == 'custom' %}selected{% endif %}>custom</option>
        </select>

        <label>LLM API Key（可选）</label>
        <input name="llm_api_key" value="{{ config.llm_api_key }}" placeholder="sk-...">

        <label>LLM Model（可选）</label>
        <input name="llm_model" value="{{ config.llm_model }}" placeholder="例如: openai/gpt-4o-mini 或 qwen-plus">

        <label>全局 RSS 源（每行一个 URL）</label>
        <textarea name="global_rss_urls">{% for url in config.global_rss_urls %}{{ url }}
{% endfor %}</textarea>
        <p class="hint">这些 RSS 会对所有 tracker 生效，并与任务自身 RSS 源合并去重。</p>

        <button type="submit">保存配置</button>
      </form>
    </div>
  </div>
</body>
</html>
