<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OpenSentinel Admin</title>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <style>
    :root {
      --bg: #f2f6f5;
      --surface: #ffffff;
      --panel: #f7fbfa;
      --text: #1d2a2f;
      --muted: #5f6f76;
      --line: #d7e0e3;
      --primary: #0d6a7b;
      --danger: #c1362f;
      --ok: #157f4e;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--text);
      background:
        radial-gradient(circle at 12% -12%, #d8ebe8 0, transparent 35%),
        radial-gradient(circle at 100% 0, #ecf3fd 0, transparent 28%),
        var(--bg);
      font-family: "Segoe UI", "PingFang SC", "Noto Sans CJK SC", sans-serif;
    }
    .layout {
      max-width: 1320px;
      margin: 0 auto;
      padding: 20px 16px;
      display: grid;
      grid-template-columns: 260px 1fr;
      gap: 14px;
      min-height: 100vh;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 12px;
    }
    .sidebar {
      padding: 14px;
      position: sticky;
      top: 16px;
      height: fit-content;
    }
    h1 {
      margin: 0;
      font-size: 22px;
      letter-spacing: 0.2px;
    }
    .hint {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
    }
    .menu { margin-top: 14px; display: grid; gap: 8px; }
    .menu a {
      display: block;
      text-decoration: none;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--panel);
      color: var(--text);
      padding: 10px 12px;
      font-size: 14px;
    }
    .menu a:hover {
      border-color: #a6c3ca;
      background: #eef7f6;
    }
    #panel-content {
      padding: 14px;
      min-height: 76vh;
    }
    @media (max-width: 980px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar { position: static; }
    }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar card">
      <h1>OpenSentinel</h1>
      <p class="hint">管理任务、Provider 与 RSS 信源。所有操作都在右侧面板局部刷新。</p>
      <nav class="menu">
        <a href="/admin/panels/trackers" hx-get="/admin/panels/trackers" hx-target="#panel-content" hx-swap="innerHTML">任务列表</a>
        <a href="/admin/panels/tracker-form" hx-get="/admin/panels/tracker-form" hx-target="#panel-content" hx-swap="innerHTML">添加任务</a>
        <a href="/admin/panels/providers" hx-get="/admin/panels/providers" hx-target="#panel-content" hx-swap="innerHTML">添加 Provider</a>
        <a href="/admin/panels/rss-sources" hx-get="/admin/panels/rss-sources" hx-target="#panel-content" hx-swap="innerHTML">添加 RSS 源</a>
      </nav>
    </aside>

    <main id="panel-content" class="card">
      {% if inline_panel %}
      {% include inline_panel %}
      {% endif %}
    </main>
  </div>
</body>
</html>
