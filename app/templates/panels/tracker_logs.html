<style>
  .panel-title { margin: 0 0 10px; font-size: 20px; }
  .panel-subtitle { margin: 0 0 14px; color: #5f6f76; font-size: 12px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { padding: 9px 8px; border-bottom: 1px solid #ebf0f2; text-align: left; vertical-align: top; }
  th { background: #f7fbfa; color: #30434b; }
  .btn {
    border: 1px solid #d7e0e3;
    background: #f7fbfa;
    color: #1d2a2f;
    border-radius: 8px;
    padding: 6px 10px;
    cursor: pointer;
    margin-bottom: 10px;
  }
</style>

<button class="btn" hx-get="/admin/panels/trackers" hx-target="#panel-content" hx-swap="innerHTML">返回任务列表</button>
<h2 class="panel-title">执行日志: {{ tracker.title }}</h2>
<p class="panel-subtitle">展示该任务最近执行记录。</p>

<table>
  <thead>
    <tr>
      <th>开始时间</th>
      <th>结束时间</th>
      <th>触发方式</th>
      <th>状态</th>
      <th>消息</th>
    </tr>
  </thead>
  <tbody>
    {% for log in logs %}
    <tr>
      <td>{{ log.started_at }}</td>
      <td>{{ log.ended_at or '-' }}</td>
      <td>{{ log.trigger }}</td>
      <td>{{ log.status }}</td>
      <td>{{ log.message }}</td>
    </tr>
    {% else %}
    <tr>
      <td colspan="5" style="color:#5f6f76;">暂无执行日志。</td>
    </tr>
    {% endfor %}
  </tbody>
</table>
